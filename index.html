<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بتاع ترجمة | محمد عمر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; cursor: none; } /* إخفاء الماوس العادي */
        .hero-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        
        /* تصميم الماوس الجديد */
        #custom-cursor {
            width: 20px; height: 20px;
            border: 2px solid #facc15;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease, background 0.3s ease, width 0.3s ease, height 0.3s ease;
            transform: translate(-50%, -50%);
        }
        /* نقطة صغيرة في نص الماوس */
        #cursor-dot {
            width: 4px; height: 4px;
            background: #facc15;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        
        /* لما الماوس يقف على زرار */
        .cursor-hover #custom-cursor {
            width: 50px; height: 50px;
            background: rgba(250, 204, 21, 0.2);
            border-color: #facc15;
        }

        * { transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <div id="custom-cursor"></div>
    <div id="cursor-dot"></div>

    <nav class="bg-indigo-950 shadow-md sticky top-0 z-50 border-b border-yellow-400">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-white tracking-tighter cursor-pointer hover-target">
                <span class="bg-yellow-400 text-indigo-950 px-2 py-1 rounded">بتاع</span> ترجمة
            </div>
            <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
                <a href="#" class="text-white hover:text-yellow-400 hover:scale-110 transform hover-target">الرئيسية</a>
                <a href="#" class="text-gray-300 hover:text-white hover:scale-110 transform hover-target">المقالات</a>
                <a href="#" class="text-gray-300 hover:text-white hover:scale-110 transform hover-target">عن محمد عمر</a>
            </div>
            <a href="https://youtube.com/@Beta3Tarjama" target="_blank" class="bg-red-600 text-white px-6 py-2 rounded-full font-bold hover:scale-110 hover:shadow-lg hover:shadow-red-500/50 hover-target transition">SUBSCRIBE</a>
        </div>
    </nav>

    <header class="hero-gradient text-white py-20 px-6 relative">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center">
            <div class="md:w-3/5 text-center md:text-right space-y-6">
                <h1 class="text-5xl md:text-7xl font-extrabold leading-tight">احترف الترجمة مع <span class="text-yellow-400">محمد عمر</span></h1>
                <p class="text-xl text-purple-100">طريقك من الصفر إلى أول عميل دولي.</p>
                <button class="bg-yellow-400 text-indigo-950 px-10 py-4 rounded-xl font-bold hover:scale-105 hover-target shadow-xl">ابدأ رحلتك مجاناً</button>
            </div>
            <div class="md:w-2/5 mt-12 md:mt-0">
                <div class="w-72 h-72 md:w-96 md:h-96 rounded-full overflow-hidden border-8 border-yellow-400 shadow-2xl mx-auto hover:rotate-3 hover:scale-105 transition-all hover-target">
                    <img src="https://i.ibb.co/VDPQf8N/my-photo.jpg" alt="محمد عمر" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </header>

    <footer class="bg-indigo-950 text-white py-10 text-center">
        <p>© 2026 بتاع ترجمة - تجربة تصفح فريدة</p>
    </footer>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const dot = document.getElementById('cursor-dot');
        const targets = document.querySelectorAll('.hover-target');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        targets.forEach(target => {
            target.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            target.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });
    </script>

</body>
</html>
