    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --main-gold: #facc15; --dark-bg: #0f172a; }
        body { 
            font-family: 'Cairo', sans-serif; background: var(--dark-bg);
            color: white; overflow-x: hidden; scroll-behavior: smooth;
        }
        h1, h2, h3 { font-weight: 900 !important; }

        /* الماوس الجمالي المتحرك (Glowing Dot) */
        #cursor-follower {
            width: 30px; height: 30px; border: 2px solid rgba(250, 204, 21, 0.5);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out; transform: translate(-50%, -50%);
        }

        /* ستايل الشريط الكبسولة الاحترافي */
        .nav-capsule {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
        }

        .nav-link { position: relative; transition: all 0.3s; }
        .nav-link::after {
            content: ''; position: absolute; width: 0; height: 2px;
            bottom: -4px; right: 0; background-color: var(--main-gold);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        /* ستايل الزجاج الفخم (Glassmorphism) للكروت */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(-2deg);
            border-color: var(--main-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* أنيميشن الصورة المعزولة (3D Depth & Breaking Out) */
        .hero-image-container {
            perspective: 1000px;
        }
        .main-hero-img {
            transform: rotateY(-10deg) rotateX(5deg);
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            box-shadow: -20px 20px 50px rgba(0,0,0,0.5);
            pointer-events: none; /* عشان ما يقطعش على الماوس */
        }
        .hero-image-container:hover .main-hero-img {
            transform: rotateY(0deg) rotateX(0deg) scale(1.02) translateZ(50px);
            box-shadow: -30px 30px 70px rgba(0,0,0,0.6);
        }

        /* هالة النيون المضيئة (Neon Glow) */
        .neon-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140%; height: 140%;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.1) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .gold-glow { text-shadow: 0 0 25px rgba(250, 204, 21, 0.4); }
    </style>
</head>
