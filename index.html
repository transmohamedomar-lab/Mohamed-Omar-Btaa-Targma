<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بتاع ترجمة | محمد عمر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        /* أنيميشن ناعم لكل الموقع */
        * { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-indigo-950 shadow-md sticky top-0 z-50 border-b border-yellow-400">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-white">
                <span class="bg-yellow-400 text-indigo-950 px-2 py-1 rounded">بتاع</span> ترجمة
            </div>
            <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
                <a href="#" class="text-white hover:text-yellow-400 hover:scale-110 transform transition">الرئيسية</a>
                <a href="#" class="text-gray-300 hover:text-white hover:scale-110 transform transition">المقالات</a>
                <a href="#" class="text-gray-300 hover:text-white hover:scale-110 transform transition">عن محمد عمر</a>
            </div>
            <a href="https://youtube.com/@Beta3Tarjama" target="_blank" class="bg-red-600 text-white px-6 py-2 rounded-full font-bold hover:scale-110 hover:shadow-lg hover:shadow-red-500/50 active:scale-95 transition">SUBSCRIBE</a>
        </div>
    </nav>

    <header class="hero-gradient text-white py-16 px-6 overflow-hidden">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center">
            <div class="md:w-3/5 text-center md:text-right space-y-6">
                <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">احترف الترجمة مع <span class="text-yellow-400">محمد عمر</span></h1>
                <p class="text-xl text-purple-100">تعلم أسرار الترجمة وأدوات الذكاء الاصطناعي.</p>
                <div class="flex flex-wrap justify-center md:justify-start gap-4">
                    <button class="bg-yellow-400 text-indigo-950 px-10 py-4 rounded-xl font-bold hover:scale-105 hover:bg-yellow-300 shadow-xl transition">ابدأ الآن</button>
                </div>
            </div>
            <div class="md:w-2/5 mt-12 md:mt-0 relative">
                <div class="w-72 h-72 md:w-96 md:h-96 rounded-full overflow-hidden border-8 border-yellow-400 shadow-2xl mx-auto hover:rotate-3 hover:scale-105 transition">
                    <img src="https://i.ibb.co/VDPQf8N/my-photo.jpg" alt="محمد عمر" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-16 px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <article class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:-translate-y-3 hover:shadow-2xl transition">
                <div class="aspect-video">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/QnDFG4qkJWw" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-indigo-950">خطة الـ 90 يوم لتعلم اللغة</h3>
                    <p class="text-gray-600 mt-2">شاهد الخطة الكاملة مجاناً...</p>
                </div>
            </article>
        </div>
    </main>

    <footer class="bg-indigo-950 text-white py-12 px-6 text-center">
        <div class="flex justify-center gap-8 mb-6">
            <a href="#" class="hover:text-yellow-400 hover:scale-125 transition">Facebook</a>
            <a href="#" class="hover:text-yellow-400 hover:scale-125 transition">YouTube</a>
            <a href="#" class="hover:text-yellow-400 hover:scale-125 transition">LinkedIn</a>
        </div>
        <p>© 2026 بتاع ترجمة - محمد عمر</p>
    </footer>

</body>
</html>
